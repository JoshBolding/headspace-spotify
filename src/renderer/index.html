<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Headspace</title>
    <style>
      :root {
        --view-w-closed: 549px;
        --view-h: 394px;
        --head-w: 234px;
        --head-h: 394px;
        --head-x: 261px;

        /* sPlEar geometry (right ear container) */
        --pl-ear-x: 277px;
        --pl-ear-y: 86px;
        --pl-ear-w: 272px;
        --pl-ear-h: 170px;

        /* sEqEar geometry (left ear container) */
        --eq-ear-x: 207px;
        --eq-ear-y: 86px;
        --eq-ear-w: 269px;
        --eq-ear-h: 170px;

        /* skin palette pulled from drawer fill color */
        --skin-dark: #285f03;
        --skin-text: #c4ee72;
        /* Theme filter applied to head + ear bitmaps. Default = identity
           (lime). themes.ts overrides via document root inline style. */
        --theme-filter: hue-rotate(0deg) saturate(1) brightness(1);
        /* Hue used by hsla() accent colors throughout the UI. Changed by
           themes.ts on theme switch. 95° = lime green default. */
        --theme-hue: 95;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: Verdana, "Segoe UI", sans-serif;
        color: var(--skin-text);
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
      }

      #stage {
        position: relative;
        width: 100%;
        height: var(--view-h);
      }

      /* === Ears (behind head) ============================================ */
      .ear-container {
        position: absolute;
        width: var(--pl-ear-w);
        height: var(--pl-ear-h);
        top: var(--pl-ear-y);
        z-index: 0;
        --ear-recoil-x: 0px;
        --ear-recoil-y: 0px;
        --ear-tilt: 0deg;
        will-change: transform;
      }
      #pl-ear {
        left: var(--pl-ear-x);
      }
      #eq-ear {
        left: var(--eq-ear-x);
        width: var(--eq-ear-w);
      }
      .ear-img {
        position: absolute;
        top: 0;
        image-rendering: auto;
        pointer-events: none;
      }
      #pl-ear .ear-img {
        left: 185px; /* right_ear graphic offset within sPlEar */
      }
      /* Use the right-ear bitmap mirrored so both ears have the same shading
         and highlights (the original left_ear had an asymmetric highlight). */
      #eq-ear .ear-img {
        left: -3px; /* right_ear is 87w vs left_ear's 84w; offset to keep alignment */
        transform: scaleX(-1);
      }
      body.face-alive #pl-ear .ear-img {
        transform: none;
        transform-origin: 44px 86px;
      }
      body.face-alive #eq-ear .ear-img {
        transform: scaleX(-1);
        transform-origin: 41px 86px;
      }
      .speaker-cone-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        transform: translate(var(--ear-recoil-x), var(--ear-recoil-y)) rotate(var(--ear-tilt));
        transform-origin: 50% 50%;
        transition: opacity 260ms ease;
        will-change: transform;
      }
      body.face-alive .speaker-cone-layer {
        opacity: 0;
      }
      .speaker-cone {
        position: absolute;
        width: var(--cone-size, 29px);
        height: var(--cone-size, 29px);
        margin-left: calc(var(--cone-size, 29px) / -2);
        margin-top: calc(var(--cone-size, 29px) / -2);
        border-radius: 50%;
        --cone-energy: 0;
        --cone-beat: 0;
        --cone-breathe: 0;
        transform: scale(calc(0.96 + (var(--cone-breathe) * 0.07) + (var(--cone-energy) * 0.25) + (var(--cone-beat) * 0.16)));
        transform-origin: 50% 50%;
        background:
          radial-gradient(circle at 38% 32%, rgba(255, 255, 255, calc(0.32 + (var(--cone-energy) * 0.5) + (var(--cone-beat) * 0.16))) 0 9%, transparent 19%),
          radial-gradient(circle at 50% 52%, rgba(0, 0, 0, calc(0.2 + (var(--cone-energy) * 0.24))) 0 24%, rgba(255, 255, 255, calc(0.1 + (var(--cone-energy) * 0.28))) 25% 43%, rgba(0, 0, 0, calc(0.23 + (var(--cone-energy) * 0.24))) 44% 65%, transparent 71%);
        box-shadow:
          inset 0 1px 2px rgba(255, 255, 255, calc(0.22 + (var(--cone-energy) * 0.28))),
          inset 0 -3px 5px rgba(0, 0, 0, calc(0.28 + (var(--cone-energy) * 0.22))),
          0 0 12px hsla(var(--theme-hue), 100%, 63%, calc((var(--cone-energy) * 0.54) + (var(--cone-beat) * 0.38)));
        opacity: calc(0.5 + (var(--cone-energy) * 0.55) + (var(--cone-beat) * 0.2));
        mix-blend-mode: overlay;
        will-change: transform, box-shadow;
      }
      .speaker-cone::after {
        content: "";
        position: absolute;
        inset: 21%;
        border-radius: 50%;
        border: 1px solid rgba(20, 20, 20, 0.34);
        box-shadow:
          0 0 0 2px rgba(255, 255, 255, calc(0.13 + (var(--cone-energy) * 0.2))),
          inset 0 0 4px rgba(0, 0, 0, 0.44);
      }
      .speaker-cone[data-band="high"] {
        --cone-size: 28px;
      }
      .speaker-cone[data-band="mid"],
      .speaker-cone[data-band="bass"] {
        --cone-size: 30px;
      }
      #pl-ear .speaker-cone[data-band="high"] { left: 237px; top: 39px; }
      #pl-ear .speaker-cone[data-band="mid"] { left: 220px; top: 86px; }
      #pl-ear .speaker-cone[data-band="bass"] { left: 220px; top: 134px; }
      #eq-ear .speaker-cone[data-band="high"] { left: 32px; top: 39px; }
      #eq-ear .speaker-cone[data-band="mid"] { left: 49px; top: 86px; }
      #eq-ear .speaker-cone[data-band="bass"] { left: 49px; top: 134px; }

      /* Drawer body — fills the rectangle behind each ear's drawer panel. */
      .drawer-body {
        position: absolute;
        top: 10px;
        width: 172px;
        height: 140px;
        background: var(--skin-dark);
        overflow: hidden;
        z-index: 0;
      }

      /* Bezel edges that butt up against the head silhouette to close the
         gap between drawer body and head. These were part of the original
         skin and are the reason the original looked seamless. */
      .drawer-edge {
        position: absolute;
        top: 0;
        z-index: 1;
        pointer-events: none;
      }
      #pl-edge {
        left: 0; /* right_drawer_left at sPlEar (0, 0) */
      }
      #eq-edge {
        left: 251px; /* left_drawer_right at sEqEar (251, 0) */
      }
      #pl-ear .drawer-body {
        left: 13px;
      }
      .drawer-body .pl-list {
        list-style: none;
        margin: 0;
        padding: 4px 0;
        height: 100%;
        overflow-y: auto;
        font-size: 10px;
        line-height: 1.45;
      }
      .pl-list::-webkit-scrollbar {
        width: 6px;
      }
      .pl-list::-webkit-scrollbar-thumb {
        background: #4a8a16;
      }
      .pl-item {
        padding: 2px 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
      }
      .pl-item:hover {
        background: #1c4501;
      }
      .pl-current {
        background: #5e9a14;
        color: #061600;
        font-weight: 600;
      }
      .pl-empty {
        padding: 12px 8px;
        opacity: 0.65;
        font-size: 10px;
        font-style: italic;
        text-align: center;
      }

      /* === EQ drawer body ================================================ */
      #eq-ear .drawer-body {
        left: 84px; /* sEqView at (84, 10) within sEqEar */
        width: 171px;
      }
      #eq-panel {
        position: absolute;
        inset: 0;
        padding: 0;
      }
      .eq-row-top {
        display: flex;
        gap: 10px;
        padding: 11px 8px 0 8px;
        align-items: center;
      }
      .eq-label {
        font-size: 8px;
        color: var(--skin-text);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        opacity: 0.85;
      }
      .eq-row-bands {
        position: absolute;
        left: 11px;
        top: 44px;
        width: 150px;
        height: 80px;
        display: flex;
        gap: 6px;
      }
      .eq-band {
        position: relative;
        width: 9px;
        height: 76px;
      }
      .eq-reset {
        position: absolute;
        right: 8px;
        bottom: 4px;
        font-size: 9px;
        color: #d8e8a8;
        text-decoration: underline;
        cursor: pointer;
        opacity: 0.7;
      }
      .eq-reset:hover {
        opacity: 1;
      }

      /* === Custom slider ================================================ */
      .skin-slider {
        position: relative;
        cursor: pointer;
        touch-action: none;
      }
      .skin-slider.vertical {
        background: linear-gradient(
          to right,
          transparent 0,
          transparent 3px,
          #061600 3px,
          #061600 5px,
          transparent 5px
        );
      }
      .skin-slider.horizontal {
        background: linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          #061600 2px,
          #061600 4px,
          transparent 4px
        );
      }
      .skin-slider-fill {
        position: absolute;
        background: #6ea620;
        pointer-events: none;
      }
      .skin-slider-thumb {
        position: absolute;
        width: 9px;
        height: 9px;
        background: linear-gradient(135deg, #8fc230, #3d6a10);
        border: 1px solid #1c4501;
        border-radius: 1px;
        pointer-events: none;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.4);
      }
      .skin-slider-disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .skin-slider-disabled .skin-slider-thumb {
        background: linear-gradient(135deg, #6a8a4a, #2d3a18);
      }

      /* Drawer-handle button on the ear. Each side uses the original
         L_drwr_*.png / R_drwr_*.png bitmaps; the .open class flips the
         arrow direction when its drawer is currently extended. */
      .ear-handle {
        position: absolute;
        z-index: 2;
        appearance: none;
        -webkit-appearance: none;
        border: 0;
        padding: 0;
        margin: 0;
        background-color: transparent;
        background-repeat: no-repeat;
        background-position: center;
        outline: none;
        font: inherit;
        color: inherit;
        cursor: pointer;
      }
      .ear-handle:focus,
      .ear-handle:focus-visible {
        outline: none;
      }
      /* Use the right-ear handle bitmap mirrored for the left ear so both
         sides have the same visual distribution of arrow vs grip lines. */
      #btn-eq-handle {
        width: 22px;
        height: 38px;
        background-image: url("R_drwr_open_01_default.png");
        transform: scaleX(-1);
      }
      #btn-eq-handle:hover {
        background-image: url("R_drwr_open_02_rollover.png");
      }
      #btn-eq-handle:active {
        background-image: url("R_drwr_open_03_down.png");
      }
      #btn-eq-handle.open {
        background-image: url("R_drwr_close_01_default.png");
      }
      #btn-eq-handle.open:hover {
        background-image: url("R_drwr_close_02_rollover.png");
      }
      #btn-eq-handle.open:active {
        background-image: url("R_drwr_close_03_down.png");
      }
      #btn-pl-handle {
        width: 22px;
        height: 38px;
        background-image: url("R_drwr_open_01_default.png");
      }
      #btn-pl-handle:hover {
        background-image: url("R_drwr_open_02_rollover.png");
      }
      #btn-pl-handle:active {
        background-image: url("R_drwr_open_03_down.png");
      }
      #btn-pl-handle.open {
        background-image: url("R_drwr_close_01_default.png");
      }
      #btn-pl-handle.open:hover {
        background-image: url("R_drwr_close_02_rollover.png");
      }
      #btn-pl-handle.open:active {
        background-image: url("R_drwr_close_03_down.png");
      }
      #btn-pl-handle {
        left: calc(185px + 61px); /* right_ear-relative (61, 65) */
        top: 65px;
      }
      #btn-eq-handle {
        left: 8px; /* left_ear-relative (8, 66) */
        top: 66px;
      }

      /* === Head (mid layer) ============================================== */
      #head {
        position: absolute;
        left: var(--head-x);
        top: 0;
        width: var(--head-w);
        height: var(--head-h);
        image-rendering: auto;
        pointer-events: none;
        z-index: 5;
        filter: var(--theme-filter);
      }
      .ear-img,
      .drawer-edge,
      .ear-handle,
      #seek-track,
      #seek-fill,
      #pause-overlay,
      #transport,
      .skin-btn {
        filter: var(--theme-filter);
      }

      /* Drag layer covers the head bounding box, alpha-gated in JS */
      #drag {
        position: absolute;
        left: var(--head-x);
        top: 0;
        width: var(--head-w);
        height: var(--head-h);
        z-index: 6;
        cursor: default;
        -webkit-app-region: drag;
      }
      button,
      input,
      canvas,
      .hotzone,
      .ear-handle,
      .drawer-body,
      #nose-hitbox,
      #transport,
      #seek-track,
      #status-overlay,
      #auth-overlay {
        -webkit-app-region: no-drag;
      }

      /* === Face screen / visualizer ======================================
         The head bitmap has a transparent screen cutout at x=11-222, y=60-214
         (212x155). We size the canvas slightly larger and tuck it BEHIND the
         head (z-index < #head) so the head's rounded silhouette overlaps the
         canvas edges and the screen looks inset rather than pasted on top. */
      /* All face-screen elements share the same shape. We use a single
         "bounded inverse mask" generated from head.png by flood-filling the
         cutout interior — only pixels connected to the cutout center are
         visible, and the boundary alpha = 255 - head_alpha so the screen
         edge blends pixel-perfectly with the head's anti-aliased frame.
         The mask is full head dimensions (234x394); each element offsets
         the mask by its own (left, top) so the mask aligns with the head. */
      #vis-canvas {
        position: absolute;
        left: calc(var(--head-x) + 2px);
        top: 50px;
        width: 230px;
        height: 175px;
        z-index: 3;
        pointer-events: none;
        -webkit-mask-image: url("head_inverse_mask.png");
                mask-image: url("head_inverse_mask.png");
        -webkit-mask-size: 234px 394px;
                mask-size: 234px 394px;
        -webkit-mask-repeat: no-repeat;
                mask-repeat: no-repeat;
        -webkit-mask-position: -2px -50px;
                mask-position: -2px -50px;
      }

      /* === Library browser (right drawer) ============================== */
      .lb-root {
        display: flex;
        flex-direction: column;
        height: 100%;
        font-size: 10px;
        color: var(--skin-text);
      }
      .lb-tabs {
        display: flex;
        gap: 2px;
        padding: 3px 4px 0;
        background: rgba(0, 0, 0, 0.18);
        border-bottom: 1px solid hsla(var(--theme-hue), 65%, 55%, 0.18);
      }
      .lb-tab {
        appearance: none;
        -webkit-appearance: none;
        flex: 1;
        background: transparent;
        border: 0;
        padding: 5px 0;
        color: var(--skin-text);
        font-size: 13px;
        cursor: pointer;
        opacity: 0.55;
        border-bottom: 2px solid transparent;
        transition: opacity 120ms, border-color 120ms;
      }
      .lb-tab:hover { opacity: 0.85; }
      .lb-tab-active {
        opacity: 1;
        border-bottom-color: hsl(var(--theme-hue), 75%, 60%);
      }
      .lb-search {
        appearance: none;
        -webkit-appearance: none;
        margin: 4px 6px;
        padding: 4px 7px;
        background: rgba(6, 22, 0, 0.5);
        border: 1px solid hsla(var(--theme-hue), 65%, 55%, 0.25);
        border-radius: 3px;
        color: var(--skin-text);
        font-size: 10px;
        outline: none;
        font-family: inherit;
      }
      .lb-search:focus {
        border-color: hsla(var(--theme-hue), 75%, 70%, 0.7);
      }
      .lb-list {
        flex: 1;
        overflow-y: auto;
        padding: 2px 0;
      }
      .lb-list::-webkit-scrollbar {
        width: 6px;
      }
      .lb-list::-webkit-scrollbar-thumb {
        background: hsla(var(--theme-hue), 65%, 55%, 0.35);
        border-radius: 3px;
      }
      .lb-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 6px;
        cursor: pointer;
        border-radius: 2px;
      }
      .lb-item:hover {
        background: hsla(var(--theme-hue), 65%, 55%, 0.12);
      }
      .lb-thumb {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        background: #061600;
        border-radius: 2px;
        object-fit: cover;
      }
      .lb-thumb-placeholder {
        background: linear-gradient(135deg, #285f03, #061600);
      }
      .lb-text {
        min-width: 0;
        flex: 1;
      }
      .lb-title {
        font-size: 10px;
        font-weight: 600;
        color: hsl(var(--theme-hue), 75%, 81%);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .lb-sub {
        font-size: 9px;
        color: hsla(var(--theme-hue), 75%, 69%, 0.65);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .lb-queue {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 20px;
        flex: 0 0 16px;
        border: 0;
        border-left: 1px solid hsla(var(--theme-hue), 65%, 55%, 0.16);
        background: transparent;
        color: hsla(var(--theme-hue), 75%, 81%, 0.8);
        font-size: 12px;
        line-height: 18px;
        padding: 0;
        cursor: pointer;
      }
      .lb-queue:hover {
        color: hsl(var(--theme-hue), 100%, 88%);
        background: hsla(var(--theme-hue), 65%, 55%, 0.12);
      }
      .lb-queue:disabled {
        cursor: default;
        opacity: 0.8;
      }
      .lb-empty {
        padding: 14px 10px;
        font-size: 10px;
        font-style: italic;
        opacity: 0.65;
        text-align: center;
      }
      .lb-settings-list {
        padding: 8px;
        overflow-y: auto;
      }
      .settings-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 100%;
      }
      .settings-title {
        font-size: 10px;
        font-weight: 700;
        color: hsl(var(--theme-hue), 75%, 84%);
      }
      .settings-body {
        font-size: 9px;
        line-height: 1.35;
        color: hsla(var(--theme-hue), 75%, 76%, 0.78);
        white-space: pre-wrap;
      }
      .settings-actions {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .settings-actions button {
        appearance: none;
        -webkit-appearance: none;
        font: inherit;
        font-size: 9px;
        padding: 3px 8px;
        border-radius: 999px;
        background: hsla(var(--theme-hue), 65%, 55%, 0.18);
        border: 1px solid hsla(var(--theme-hue), 65%, 55%, 0.5);
        color: hsl(var(--theme-hue), 75%, 82%);
        cursor: pointer;
      }
      .settings-actions button:hover {
        background: hsla(var(--theme-hue), 65%, 55%, 0.32);
      }
      .settings-actions button.primary {
        background: #1ed760;
        border-color: #1ed760;
        color: #061600;
        font-weight: 700;
      }

      /* === Queue drawer stub (left drawer, replaces EQ for v2) ========== */
      .qd-section {
        padding: 5px 8px;
      }
      .qd-section + .qd-section {
        border-top: 1px solid hsla(var(--theme-hue), 65%, 55%, 0.15);
      }
      .qd-label {
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: hsla(var(--theme-hue), 75%, 69%, 0.7);
        margin-bottom: 4px;
      }
      .qd-queue {
        flex: 1;
        min-height: 0;
        padding-top: 4px;
      }
      .qd-empty,
      .qv-empty {
        font-size: 9px;
        font-style: italic;
        opacity: 0.6;
        line-height: 1.5;
      }
      .qd-sub-note {
        font-size: 7px;
        text-transform: none;
        letter-spacing: normal;
        font-style: italic;
        opacity: 0.6;
        margin-left: 4px;
      }
      #queue-view {
        height: 72px;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .qv-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        margin-bottom: 2px;
      }
      .qv-title,
      .qv-section-label {
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: hsla(var(--theme-hue), 75%, 69%, 0.72);
      }
      .qv-section-label {
        margin: 2px 0 1px;
        opacity: 0.72;
      }
      .qv-refresh {
        appearance: none;
        -webkit-appearance: none;
        border: 0;
        background: transparent;
        color: hsla(var(--theme-hue), 75%, 81%, 0.8);
        font-size: 10px;
        line-height: 1;
        padding: 0 2px;
        cursor: pointer;
      }
      .qv-list {
        overflow-y: auto;
        min-height: 0;
        flex: 1;
      }
      .qv-list::-webkit-scrollbar { width: 5px; }
      .qv-list::-webkit-scrollbar-thumb {
        background: hsla(var(--theme-hue), 65%, 55%, 0.35);
        border-radius: 3px;
      }
      .qv-row {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        border: 0;
        background: transparent;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 2px 1px;
        color: inherit;
        text-align: left;
        border-radius: 2px;
        cursor: pointer;
      }
      .qv-row:hover {
        background: hsla(var(--theme-hue), 65%, 55%, 0.12);
      }
      .qv-current {
        cursor: default;
        background: rgba(6, 22, 0, 0.24);
      }
      .qv-thumb {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
        border-radius: 2px;
        object-fit: cover;
        display: grid;
        place-items: center;
        font-size: 8px;
        color: hsla(var(--theme-hue), 75%, 81%, 0.72);
      }
      .qv-thumb-placeholder {

      /* === Lyrics overlay (covers viz when enabled) ==================== */
      #lyrics-overlay {

      /* === Easter-egg "alive face" mode ================================
         Hidden nose hitbox over the face area — 5 left-clicks within 2s
         toggles alive mode. Eyes are layered socket rigs, tuned against the
         dark closed-eye shadows in head.png. Color tracks --theme-hue. */
      #nose-hitbox {
        position: absolute;
        left: calc(var(--head-x) + 100px);
        top: 290px;
        width: 35px;
        height: 30px;
        z-index: 10;

        /* Invisible by design — true Easter egg, no visual hint. Set to

           hitbox position. */
      }

      #alive-eye-layer {
        position: absolute;
        inset: 0;
        width: var(--head-w);
        height: var(--head-h);

      body.face-alive #alive-eye-layer {

      .alive-eye {
        position: absolute;
        width: 70px;
        height: 38px;
        --blink-scale: 0.08;
        --lid-close: 1;
        --lid-top-y: 8px;
        --lid-bottom-y: 5px;
        --eye-glow: 1;
        --eye-look-x: 0px;
        --eye-look-y: 0px;
        --eye-rot: 0deg;
        --iris-offset-x: 0px;
        --socket-lift: 0px;
        --eye-beat: 0;
        --blink-x: 15px;
        --blink-y: 8px;
        --blink-w: 40px;
        --blink-h: 22px;
        pointer-events: none;
        overflow: visible;
        transform: rotate(var(--eye-rot));
        transform-origin: 50% 50%;

      .eye-art {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 3;
        opacity: calc(0.96 + (var(--eye-glow) * 0.04));
        transform: translateY(calc(var(--eye-look-y) * 0.25));
        transform-origin: 50% 50%;
        filter:
          hue-rotate(calc((var(--theme-hue) - 108) * 1deg))
          saturate(calc(0.78 + (var(--eye-glow) * 0.04)))
          brightness(calc(0.88 + (var(--eye-glow) * 0.05)))
          contrast(1.04);
        mix-blend-mode: normal;
        will-change: transform, filter;
      }
      .alive-eye::before {
        content: none;
      }
      .alive-eye::after {
        content: none;
      }
      #alive-eye-left {
        left: 29px;
        top: 256px;
        --eye-rot: 2deg;
        --iris-offset-x: 1px;
        --blink-x: 15px;
        --blink-y: 8px;
        --blink-w: 40px;
        --blink-h: 22px;

      #alive-head-light {

        background:

          radial-gradient(ellipse at 50% 73%, hsla(var(--theme-hue), 100%, 58%, calc(0.11 * var(--head-light))) 0 10%, transparent 32%),
          linear-gradient(to bottom, transparent 54%, hsla(var(--theme-hue), 100%, 65%, calc(0.05 * var(--head-light))) 66%, transparent 86%);
        -webkit-mask-image: url("head.png");
                mask-image: url("head.png");
        -webkit-mask-size: var(--head-w) var(--head-h);

      body.face-alive #now-playing {

      /* Eyes live INSIDE #head-group so they inherit the same sway/tilt

      /* The head + eyes group transforms together so they don't separate

      #head-group {
        position: absolute;
        left: var(--head-x);
        top: 0;
        width: var(--head-w);
        height: var(--head-h);

      body.face-alive .ear-img {

      /* === Vis-mode label that flashes on the face screen on change ==== */
      #vis-mode-label {
        position: absolute;

      /* === Long-form status overlay on the face screen ================== */
      #status-overlay {
        position: absolute;
        left: calc(var(--head-x) + 2px);

        width: 230px;
        height: 175px;
        -webkit-mask-image: url("head_inverse_mask.png");
                mask-image: url("head_inverse_mask.png");

      /* === Transport controls (head-relative 48, 31; 144x25) =============

  <body>

      <div class="ear-container" id="pl-ear">

        <img class="drawer-edge" id="pl-edge" src="right_drawer_left.png" alt="" />
        <img class="ear-img" src="right_ear.png" alt="" />
        <div class="speaker-cone-layer" aria-hidden="true">
          <div class="speaker-cone" data-band="high"></div>
          <div class="speaker-cone" data-band="mid"></div>
          <div class="speaker-cone" data-band="bass"></div>
        </div>
        <button class="ear-handle" id="btn-pl-handle" title="Open playlist"></button>
      </div>

      <!-- Head + glowing eyes wrapped in a transform group so face-alive's
           sway/tilt animations move them together (eyes stay locked to face). -->
      <div id="head-group">
        <img id="head" src="head.png" alt="" />
        <div id="alive-head-light"></div>
        <div id="alive-eye-layer">
          <div id="alive-eye-left" class="alive-eye">
            <img class="eye-art" src="alive/alive-eye-left.png" alt="" />
          </div>
          <div id="alive-eye-right" class="alive-eye">
            <img class="eye-art" src="alive/alive-eye-right.png" alt="" />
          </div>
        </div>
      </div>
      <div id="drag"></div>
      <!-- Easter-egg trigger: invisible nose hitbox, 5 clicks → toggle -->
      <div id="nose-hitbox" data-opaque="1"></div>

      <!-- Face-screen visualizer -->
      <canvas id="vis-canvas"></canvas>
      <div id="vis-mode-label"></div>
      <div id="lyrics-overlay">
        <div class="ly-prev" id="ly-prev"></div>
        <div class="ly-current" id="ly-current"></div>
        <div class="ly-next" id="ly-next"></div>
      </div>
      <button id="btn-theme-toggle" data-opaque="1" title="Cycle theme">THEME</button>
      <button id="btn-lyrics-toggle" data-opaque="1" title="Toggle lyrics">LYRICS</button>
      <div id="status-overlay" data-opaque="1">
        <div>
          <div class="so-title" id="so-title"></div>
          <div class="so-body" id="so-body"></div>
          <div class="so-actions" id="so-actions"></div>
        </div>
      </div>

      <!-- Spotify sign-in overlay (visible only when not authenticated) -->
      <div id="auth-overlay" data-opaque="1">
        <div class="auth-title">Spotify</div>
        <div class="auth-sub">Sign in to play your library, search, and view what's up next.</div>
        <button id="btn-spotify-signin">Sign in</button>
        <div class="auth-status" id="auth-status-text"></div>
      </div>

      <!-- Now-playing strip -->
      <div id="now-playing"></div>

      <!-- Seek slider -->
      <div id="seek-track">
        <div id="seek-fill"></div>
      </div>

      <!-- Transport -->
      <div id="transport"></div>
      <div id="pause-overlay" hidden></div>

      <!-- Window + drawer controls -->
      <div class="winctl" id="btn-minimize" title="Minimize" data-opaque="1">
        <svg viewBox="0 0 8 8"><line x1="1" y1="6" x2="7" y2="6" /></svg>
      </div>
      <div class="winctl" id="btn-close" title="Close" data-opaque="1">
        <svg viewBox="0 0 8 8">
          <line x1="1.5" y1="1.5" x2="6.5" y2="6.5" />
          <line x1="6.5" y1="1.5" x2="1.5" y2="6.5" />
        </svg>
      </div>
      <div class="hotzone" id="btn-eq-open" title="Open equalizer"></div>
      <div class="hotzone" id="btn-pl-open" title="Open playlist"></div>

      <canvas id="debug-mask"></canvas>
    </div>
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>
